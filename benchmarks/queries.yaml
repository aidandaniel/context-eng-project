# Benchmark queries for the Context Engineering MCP.
# Each entry models a realistic request against benchmarks/fixture_repo.
#   expected_anchors    -> files that MUST appear (accuracy proxy)
#   expected_supporting -> nice-to-have neighbors (informational recall)
#   baseline_strategy   -> how the "before MCP" agent gathers context
#   baseline_k          -> number of top grep files the baseline reads in full

- id: debug_refresh_token
  query: "Fix the TypeError in refreshToken after logout in src/auth/refresh.py"
  intent: debug
  expected_anchors: ["src/auth/refresh.py"]
  expected_supporting: ["src/auth/middleware.py", "tests/test_auth.py"]
  baseline_strategy: grep_top_k_full_files
  baseline_k: 5

- id: debug_verify_token
